plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.shadowai.app"
    compileSdk 35
    ndkVersion "26.1.10909125" // Required for llama.cpp build

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.shadowai.app"
        minSdk 26 // Android 8+ for GGUF performance
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName

        // Only build for 64-bit ARM — smaller APK, better performance
        ndk {
            abiFilters "arm64-v8a"
        }

        // Native llama.cpp build - uncomment when submodule is cloned:
        // cd android/app/src/main/cpp && git clone https://github.com/ggerganov/llama.cpp
        // externalNativeBuild {
        //     cmake {
        //         cppFlags "-std=c++17 -O3 -ffast-math"
        //         arguments "-DANDROID_STL=c++_shared",
        //                   "-DANDROID_PLATFORM=android-26"
        //     }
        // }
    }

    // externalNativeBuild {
    //     cmake {
    //         path "src/main/cpp/CMakeLists.txt"
    //         version "3.22.1"
    //     }
    // }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}
